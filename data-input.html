<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 种植管家 - 数据输入</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* 自定义选择文件按钮样式 */
    .custom-file-input {
      display: none;
    }

    .custom-file-btn {
      background-color: #444;
      color: white;
      border: none;
      padding: 6px 12px;
      cursor: pointer;
    }

    .custom-file-btn:hover {
      background-color: #333;
    }

    .file-display {
      border: 1px solid #ddd;
      padding: 6px 12px;
      flex: 1;
      background-color: #fff;
    }

    .file-row {
      display: flex;
      align-items: center;
      gap: 0;
    }
  </style>
</head>

<body>
  <!-- 导航栏 -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">🌿 智禾方隅</a>
      <div class="navbar-nav ms-auto">

        <a class="nav-link" href="shouye.html">功能介绍</a>
        <a class="nav-link" href="cunchu.html">云端日志</a>
        <a class="nav-link" href="community.html">技术社区</a>

      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <section class="py-5 mt-5" style="padding-top: 100px !important;">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <h2 class="h3 mb-4 text-center text-success">植物诊断信息填写</h2>
          <form id="plant-form" class="bg-white p-4 rounded shadow-sm">
            <!-- 上传植物照片（文件选择样式） -->
            <div class="mb-4">
              <label class="form-label fw-medium">1. 上传植物照片 <span class="text-danger">*</span></label>
              <div class="mb-3">
                <input type="file" id="file-input" class="form-control" accept="image/*" required>
                <small class="text-muted">支持jpg/png等图片格式</small>
              </div>
            </div>


            <!-- 植物基本信息 -->
            <div class="row mb-4">
              <div class="col-md-6">
                <label class="form-label fw-medium">2. 植物种类 <span class="text-danger">*</span></label>
                <select class="form-select" id="plant-type" required>
                  <option value="">请选择植物种类</option>
                  <!-- 植物选项由 data-input.js 动态加载 -->
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-medium">3. 种植时长（生长阶段） <span class="text-danger">*</span></label>
                <select class="form-select" id="plant-time" required disabled>
                  <option value="">请先选择植物种类</option>
                  <!-- 种植时长选项根据所选植物动态加载 -->
                </select>
              </div>
            </div>

            <!-- 环境数据 -->
            <div class="row mb-4">
              <div class="col-md-4">
                <label class="form-label fw-medium">4. 环境温度 (℃) <span class="text-danger">*</span></label>
                <input type="number" class="form-control" id="temp" placeholder="如：25" required>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-medium">5. 环境湿度 (%) <span class="text-danger">*</span></label>
                <input type="number" class="form-control" id="humidity" placeholder="如：60" required>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-medium">6. 光照时长 (小时/天) <span class="text-danger">*</span></label>
                <input type="number" class="form-control" id="light" placeholder="如：8" required>
              </div>
            </div>

            <!-- 问题描述 -->
            <div class="mb-4">
              <label class="form-label fw-medium">7. 问题描述（可选）</label>
              <textarea class="form-control" rows="3" placeholder="请描述植物出现的异常情况，如：叶子发黄、枯萎、有虫洞等"></textarea>
            </div>

            <!-- 提交按钮 -->
            <div class="text-center">
              <button type="button" id="submit-btn" class="btn btn-success btn-lg px-5">
                提交诊断
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- 底部区域 -->
  <footer class="bg-light py-4 mt-5">
    <div class="container text-center text-muted">
      <p>© 2026 智禾方隅 - 让每一株植物都健康生长</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="plantData.js"></script>
  <script src="utils.js"></script>
  <script src="data-input.js"></script>
</body>

</html>
