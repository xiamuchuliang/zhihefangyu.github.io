<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 种植管家 - 诊断报告</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    .score-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      margin: 0 auto;
    }

    .score-value {
      font-size: 2.5rem;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <!-- 导航栏 -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">🌿 智禾方隅</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="shouye.html#features">返回首页</a>
        <a class="nav-link" href="data-input.html">重新诊断</a>
        <a class="nav-link" href="community.html">技术社区</a>
      </div>
    </div>
  </nav>

  <!-- 主内容区 -->
  <section class="py-5 mt-5" style="padding-top: 100px !important;">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-9">
          <h2 class="h3 mb-5 text-center text-success">植物诊断报告</h2>

          <!-- 健康评分卡片 -->
          <div class="card mb-4 border-0 shadow-sm">
            <div class="card-body text-center">
              <h4 class="card-title mb-3">植物健康评分</h4>
              <div class="score-circle mb-2">
                <span id="health-score" class="score-value">85</span>
              </div>
              <p id="problem-desc" class="text-muted mt-2">轻微缺水，光照不足</p>
            </div>
          </div>

          <!-- 专家建议卡片 -->
          <div class="card mb-4 border-0 shadow-sm">
            <div class="card-header bg-success text-white border-0">
              <h5 class="mb-0"><i class="bi bi-lightbulb-fill me-2"></i>专家养护建议</h5>
            </div>
            <div class="card-body">
              <ul id="suggestions-list" class="list-group list-group-flush">
                <!-- 由JS动态渲染 -->
              </ul>
            </div>
          </div>

          <!-- 下一步行动 -->
          <div class="card border-0 shadow-sm">
            <div class="card-header bg-light border-0">
              <h5 class="mb-0"><i class="bi bi-arrow-right-circle-fill me-2 text-success"></i>下一步行动</h5>
            </div>
            <div class="card-body">
              <div class="d-flex flex-wrap gap-3 justify-content-center">
                <button id="plan-btn" class="btn btn-success px-4">
                  <i class="bi bi-file-earmark-text me-2"></i>生成种植方案
                </button>
                <button id="expert-btn" class="btn btn-outline-success px-4">
                  <i class="bi bi-headset me-2"></i>联系专家咨询
                </button>
                <button class="btn btn-outline-secondary px-4" id="save-to-cloud-btn">
                  <i class="bi bi-cloud-upload me-2"></i>保存到云端日志
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- 底部区域 -->
  <footer class="bg-light py-4 mt-5">
    <div class="container text-center text-muted">
      <p>© 2026 智禾方隅 - 让每一株植物都健康生长</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="utils.js"></script>
  <script src="report.js"></script>
</body>

</html>
