<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>云端日志功能测试</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <div class="container mt-5">
    <h2>云端日志功能测试</h2>

    <div class="row mt-4">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">
            <h5>添加测试诊断记录</h5>
          </div>
          <div class="card-body">
            <button class="btn btn-primary" onclick="addTestRecord()">添加测试记录</button>
            <button class="btn btn-secondary ms-2" onclick="clearAllRecords()">清空所有记录</button>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card">
          <div class="card-header">
            <h5>当前记录统计</h5>
          </div>
          <div class="card-body">
            <p>AI诊断记录数量: <span id="recordCount">0</span></p>
            <button class="btn btn-info" onclick="showRecords()">显示所有记录</button>
            <a href="cunchu.html" class="btn btn-success ms-2">查看云端日志页面</a>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-4">
      <div class="card">
        <div class="card-header">
          <h5>记录详情</h5>
        </div>
        <div class="card-body">
          <pre id="recordDetails" style="max-height: 400px; overflow-y: auto;"></pre>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 更新记录数量显示
    function updateRecordCount() {
      const logs = JSON.parse(localStorage.getItem('aiDiagnosisLogs') || '[]');
      document.getElementById('recordCount').textContent = logs.length;
    }

    // 添加测试记录
    function addTestRecord() {
      const timestamp = new Date().toISOString().replace(/[-:]/g, '').split('.')[0];
      const dataId = `AI${timestamp}${Math.floor(Math.random() * 1000).toString().padStart(3, '0')}`;

      const testPlants = ['番茄', '黄瓜', '草莓', '生菜', '辣椒'];
      const testProblems = ['叶片发黄', '生长缓慢', '病虫害', '缺水症状', '营养不良'];
      const randomPlant = testPlants[Math.floor(Math.random() * testPlants.length)];
      const randomProblem = testProblems[Math.floor(Math.random() * testProblems.length)];

      const testRecord = {
        id: dataId,
        type: "diagnosis",
        typeName: "AI植物诊断",
        cropName: randomPlant,
        createTime: new Date().toLocaleString('zh-CN'),
        updateTime: new Date().toLocaleString('zh-CN'),
        status: "processed",
        statusName: "已处理",
        inputData: {
          plantType: randomPlant,
          plantStage: "生长期",
          temperature: `${(20 + Math.random() * 10).toFixed(1)}℃`,
          humidity: `${(50 + Math.random() * 30).toFixed(0)}%`,
          lightHours: `${(6 + Math.random() * 4).toFixed(1)}小时/天`,
          problemDescription: randomProblem
        },
        aiResult: {
          healthScore: Math.floor(60 + Math.random() * 40),
          diagnosis: randomProblem,
          suggestions: [
            "调整浇水频率",
            "改善光照条件",
            "检查土壤营养",
            "注意通风环境"
          ],
          confidence: "95%",
          analysisTime: new Date().toLocaleString('zh-CN')
        }
      };

      // 保存到localStorage
      let logs = JSON.parse(localStorage.getItem('aiDiagnosisLogs') || '[]');
      logs.unshift(testRecord);
      localStorage.setItem('aiDiagnosisLogs', JSON.stringify(logs));

      updateRecordCount();
      alert(`已添加测试记录: ${dataId}`);
    }

    // 清空所有记录
    function clearAllRecords() {
      if (confirm('确定要清空所有AI诊断记录吗？')) {
        localStorage.removeItem('aiDiagnosisLogs');
        updateRecordCount();
        document.getElementById('recordDetails').textContent = '';
        alert('所有记录已清空');
      }
    }

    // 显示所有记录
    function showRecords() {
      const logs = JSON.parse(localStorage.getItem('aiDiagnosisLogs') || '[]');
      document.getElementById('recordDetails').textContent = JSON.stringify(logs, null, 2);
    }

    // 页面加载时更新计数
    document.addEventListener('DOMContentLoaded', updateRecordCount);
  </script>
</body>

</html>
